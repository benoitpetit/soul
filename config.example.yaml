# SOUL - System for Observed Unique Legacy
# Configuration example
# NOTE: SOUL is currently stdio-only. The MCP server uses JSON-RPC over stdin/stdout.
#       HTTP/TCP transport (host/port/auth) is planned for a future release.

soul:
  # Version
  version: "0.0.2"
  
  # Storage configuration
  # SOUL shares the SQLite database with MIRA when embedded.
  # When standalone, this is the path to its own database file.
  storage:
    # Path to SQLite database — shared with MIRA (same file!)
    path: ".mira/mira.db"
    
    # The following SQLite tuning options are parsed but currently use
    # hardcoded defaults in the storage layer. They are reserved for future use.
    # journal_mode: WAL
    # synchronous: NORMAL
    # cache_size: -64000
    # mmap_size: 268435456
  
  # Identity extraction configuration
  extraction:
    # Minimum confidence for a trait to be considered valid
    min_trait_confidence: 0.3
    
    # Number of observations needed for a trait to be well-established
    min_observations_for_trait: 5
    
    # The following options are documented but NOT YET IMPLEMENTED:
    # extraction_lookback_days: 30
    # enabled_categories:
    #   - cognitive
    #   - emotional
    #   - social
    #   - epistemic
    #   - expressive
    #   - ethical
  
  # Identity recall configuration
  recall:
    # Default token budget for identity prompts
    default_budget_tokens: 1000
    
    # The following options are documented but NOT YET IMPLEMENTED:
    # min_budget_tokens: 200
    # max_budget_tokens: 2000
    # identity_priority: 100
    # enrich_with_mira_memories: true   # MIRA memory enrichment is not wired
    # max_mira_memories: 5
  
  # Drift detection configuration
  drift_detection:
    # Threshold for drift alert (0.0 - 1.0)
    # 0.3 means 30% change triggers an alert
    threshold: 0.3
    
    # Window size for drift calculation (number of versions)
    window_size: 10
    
    # Check drift automatically after each capture
    auto_check_after_capture: true
    
    # The following options are documented but NOT YET IMPLEMENTED:
    # monitored_dimensions:
    #   - voice_profile
    #   - personality_traits
    #   - value_system
    #   - emotional_tone
  
  # Model swap configuration
  model_swap:
    # Automatically reinforce identity after model swap
    auto_reinforce: true
    
    # The following options are documented but NOT YET IMPLEMENTED:
    # max_acceptable_post_swap_drift: 0.3
    # generate_reinforcement_prompt: true
    # notify_mira: true                  # MIRA notification channel is not wired
  
  # Evolution tracking
  evolution:
    # Track evolution automatically
    enabled: true
    
    # Number of versions to keep in history
    max_history_versions: 100
    
    # The following options are documented but NOT YET IMPLEMENTED:
    # compress_old_versions: true
    # compression_age_days: 90
  
  # MCP (Model Context Protocol) configuration
  # NOTE: SOUL currently operates via stdio JSON-RPC only.
  #       HTTP/TCP transport settings below are reserved for a future release.
  mcp:
    # Enable MCP server
    enabled: true
    
    # host: "localhost"   # NOT YET IMPLEMENTED — stdio only
    # port: 8081          # NOT YET IMPLEMENTED — stdio only
    # auth_token: ""      # NOT YET IMPLEMENTED — stdio only
  
  # Logging configuration
  # NOTE: Logging settings are documented but NOT YET IMPLEMENTED.
  #       SOUL currently uses Go's standard slog with default settings.
  # logging:
  #   level: "info"
  #   format: "text"
  #   file: ""
